suite: test rbac
templates:
  - clusterrole.yaml
  - clusterrolebinding.yaml
tests:
  - it: should render clusterroles by default
    asserts:
      - isKind:
          of: ClusterRole
        template: clusterrole.yaml
      - isKind:
          of: ClusterRoleBinding
        template: clusterrolebinding.yaml

  - it: should render Roles when rbac.namespaces is set
    set:
      rbac.namespaces:
        - NAMESPACE
    asserts:
      - isKind:
          of: Role
        template: clusterrole.yaml
      - isKind:
          of: RoleBinding
        template: clusterrolebinding.yaml
      - equal:
          path: metadata.namespace
          value: NAMESPACE
        template: clusterrole.yaml
      - equal:
          path: metadata.namespace
          value: NAMESPACE
        template: clusterrolebinding.yaml

  - it: should render a single role/binding in the listed namespace only (no release-ns fallback)
    set:
      rbac.namespaces:
        - NAMESPACE
    asserts:
      - hasDocuments:
          count: 1
        template: clusterrole.yaml
      - equal:
          path: metadata.namespace
          value: NAMESPACE
        template: clusterrole.yaml
      - hasDocuments:
          count: 1
        template: clusterrolebinding.yaml
      - equal:
          path: metadata.namespace
          value: NAMESPACE
        template: clusterrolebinding.yaml

  - it: should render multiple roles and bindings when namespaces are specified
    set:
      rbac.namespaces:
        - ns1
        - NAMESPACE
        - ns2
    asserts:
      - hasDocuments:
          count: 3
        template: clusterrole.yaml
      - equal:
          path: metadata.namespace
          value: NAMESPACE
        template: clusterrole.yaml
        documentIndex: 0
      - equal:
          path: metadata.namespace
          value: ns1
        template: clusterrole.yaml
        documentIndex: 1
      - equal:
          path: metadata.namespace
          value: ns2
        template: clusterrole.yaml
        documentIndex: 2
      - hasDocuments:
          count: 3
        template: clusterrolebinding.yaml
      - equal:
          path: metadata.namespace
          value: NAMESPACE
        template: clusterrolebinding.yaml
        documentIndex: 0
      - equal:
          path: metadata.namespace
          value: ns1
        template: clusterrolebinding.yaml
        documentIndex: 1
      - equal:
          path: metadata.namespace
          value: ns2
        template: clusterrolebinding.yaml
        documentIndex: 2

  - it: should fail rendering if the removed rbac.clusterScoped field is set
    set:
      rbac.clusterScoped: false
    template: clusterrolebinding.yaml
    asserts:
      - failedTemplate:
          errorMessage: "rbac.clusterScoped has been removed. Leave rbac.namespaces empty for cluster-scoped RBAC, or set rbac.namespaces=[<ns>, ...] for namespaced RBAC."

  - it: should fail rendering if rbac.namespaces is set but does not include the install namespace
    set:
      rbac.namespaces:
        - some-other-ns
    template: clusterrolebinding.yaml
    asserts:
      - failedTemplate:
          errorMessage: 'rbac.namespaces is set but does not include the install namespace "NAMESPACE"'

  - it: should accept a custom install namespace when listed in rbac.namespaces
    set:
      namespaceOverride: my-ns
      rbac.namespaces:
        - my-ns
        - other-ns
    template: clusterrole.yaml
    asserts:
      - hasDocuments:
          count: 2
      - equal:
          path: metadata.namespace
          value: my-ns
        documentIndex: 0
      - equal:
          path: metadata.namespace
          value: other-ns
        documentIndex: 1
